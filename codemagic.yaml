definitions:
  instance_type: &instance_type mac_mini_m1

workflows:
  default-workflow:
    name: Android Release Build
    max_build_duration: 60
    instance_type: *instance_type
    environment:
      flutter: stable
      xcode: 14.2
    scripts:
      - name: Get Flutter packages  
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - mgccmukesh@gmail.com
        notify:
          success: true
          failure: true
